name: Deploy to staging

on:
  push:
    branches: [staging]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Sync to staging
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='functions' \
            ./ root@10.10.10.1:/mnt/Walker_Raid_Array/apps/portfolio-staging/site/
