  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="TelegramPhone.jsx"></script>
  <script type="text/babel" src="PippaConversation.jsx"></script>
  <script type="text/babel" src="Sections.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "sectionSpacing": 1,
      "bgDim": 0.85
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      React.useEffect(() => {
        const root = document.getElementById("pp-root");
        root.style.setProperty("--pp-space-scale", String(t.sectionSpacing));
        root.style.setProperty("--pp-bg-alpha", String(t.bgDim));
      }, [t.sectionSpacing, t.bgDim]);
      return (
        <>
          <Hero />
          <WhyPippa />
          <ChatSection />
          <HowDesigned />
          <WhatIWontShow />
          <Sources />
          <Close />
          <TweaksPanel>
            <TweakSection label="Layout" />
            <TweakSlider
              label="Section spacing"
              value={t.sectionSpacing}
              min={0.25} max={2} step={0.05}
              unit="×"
              onChange={(v) => setTweak("sectionSpacing", Number(v.toFixed(2)))}
            />
            <TweakSection label="Background" />
            <TweakSlider
              label="Doodle dimming"
              value={t.bgDim}
              min={0} max={0.9} step={0.05}
              onChange={(v) => setTweak("bgDim", Number(v.toFixed(2)))}
            />
          </TweaksPanel>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById("pp-root")).render(<App />);
  </script>

  <div class="archie-panel" role="dialog" aria-label="Chat with Archie">
    <div class="archie-panel-head">
      <span class="ap-mark">A</span>
      <span>Archie</span>
      <span class="ap-status">online</span>
    </div>
    <div class="archie-panel-body"></div>
    <form class="archie-panel-foot">
      <input type="text" placeholder="Ask about Geoff's work…" autocomplete="off" aria-label="Your message">
      <button type="submit">Send</button>
    </form>
  </div>
  <div class="archie-fab">
    <button class="archie-fab-btn" aria-label="Chat with Archie" aria-expanded="false">A</button>
  </div>
  <script src="/assets/nav-controls.js"></script>
  <script src="/assets/archie-chat.js"></script>
